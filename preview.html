<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移动待办事项 - 预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        .header {
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        .app-preview {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .app-preview::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: linear-gradient(90deg, #4a90e2, #7ed321, #ffa502);
        }
        
        .preview-title {
            color: #2d3436;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .phone-mockup {
            max-width: 300px;
            margin: 0 auto;
            position: relative;
        }
        
        .phone-frame {
            background: #1a202c;
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        .phone-screen {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            height: 500px;
            position: relative;
        }
        
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 20px;
            background: #1a202c;
            border-radius: 0 0 10px 10px;
            z-index: 10;
        }
        
        .app-content {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .app-header-preview {
            background: linear-gradient(135deg, #4a90e2, #5a9cf8);
            color: white;
            padding: 20px;
            border-radius: 0 0 20px 20px;
        }
        
        .app-main-preview {
            flex: 1;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .task-preview {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .task-checkbox-preview {
            width: 24px;
            height: 24px;
            border: 2px solid #636e72;
            border-radius: 50%;
        }
        
        .task-checkbox-preview.completed {
            background: #7ed321;
            border-color: #7ed321;
        }
        
        .task-text-preview {
            flex: 1;
            text-align: left;
            color: #2d3436;
        }
        
        .task-text-preview.completed {
            text-decoration: line-through;
            color: #636e72;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
        }
        
        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .feature-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .feature-desc {
            opacity: 0.9;
            line-height: 1.5;
        }
        
        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        
        .btn {
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: white;
            color: #4a90e2;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .btn-primary:hover {
            background: #f8f9fa;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .github-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }
        
        .github-link {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }
        
        .github-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .phone-mockup {
                max-width: 250px;
            }
            
            .phone-screen {
                height: 400px;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            .cta-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .phone-mockup {
                max-width: 200px;
            }
            
            .phone-screen {
                height: 350px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>移动待办事项</h1>
            <p class="subtitle">专为手机设计的现代化任务管理应用</p>
        </div>
        
        <div class="app-preview">
            <h2 class="preview-title">应用预览</h2>
            <div class="phone-mockup">
                <div class="phone-notch"></div>
                <div class="phone-frame">
                    <div class="phone-screen">
                        <div class="app-content">
                            <div class="app-header-preview">
                                <h3 style="margin-bottom: 10px;">待办事项</h3>
                                <div style="font-size: 0.9rem; opacity: 0.9;">2026年3月6日 星期五</div>
                            </div>
                            <div class="app-main-preview">
                                <div class="task-preview">
                                    <div class="task-checkbox-preview completed"></div>
                                    <div class="task-text-preview completed">欢迎使用移动待办事项</div>
                                </div>
                                <div class="task-preview">
                                    <div class="task-checkbox-preview"></div>
                                    <div class="task-text-preview">点击任务标记完成</div>
                                </div>
                                <div class="task-preview">
                                    <div class="task-checkbox-preview"></div>
                                    <div class="task-text-preview">长按任务可以删除</div>
                                </div>
                                <div class="task-preview">
                                    <div class="task-checkbox-preview"></div>
                                    <div class="task-text-preview">尝试添加新任务</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <h3 class="feature-title">移动优先</h3>
                <p class="feature-desc">专为手机屏幕优化，触摸交互友好，支持PWA安装</p>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-palette"></i>
                </div>
                <h3 class="feature-title">现代化设计</h3>
                <p class="feature-desc">渐变色彩、圆角设计、流畅动画，支持暗色模式</p>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-database"></i>
                </div>
                <h3 class="feature-title">离线使用</h3>
                <p class="feature-desc">数据保存在本地，无需网络连接即可使用</p>
            </div>
        </div>
        
        <div class="cta-buttons">
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-play"></i> 立即使用
            </a>
            <a href="https://github.com/yinyucheng0601/mobile-todo-web-app" target="_blank" class="btn btn-secondary">
                <i class="fab fa-github"></i> 查看源码
            </a>
        </div>
        
        <div class="github-info">
            <p style="margin-bottom: 15px; opacity: 0.9;">项目已成功推送到 GitHub</p>
            <a href="https://github.com/yinyucheng0601/mobile-todo-web-app" target="_blank" class="github-link">
                <i class="fab fa-github"></i> https://github.com/yinyucheng0601/mobile-todo-web-app
            </a>
        </div>
    </div>
    
    <script>
        // 简单的动画效果
        document.addEventListener('DOMContentLoaded', function() {
            const featureCards = document.querySelectorAll('.feature-card');
            featureCards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
                card.style.animation = 'fadeInUp 0.6s ease forwards';
            });
            
            // 添加CSS动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeInUp {
                    from {
                        opacity: 0;
                        transform: translateY(20px);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }
            `;
            document.head.appendChild(style);
            
            // 任务完成状态切换
            let currentTask = 1;
            setInterval(() => {
                const tasks = document.querySelectorAll('.task-checkbox-preview');
                const taskTexts = document.querySelectorAll('.task-text-preview');
                
                tasks[currentTask].classList.toggle('completed');
                taskTexts[currentTask].classList.toggle('completed');
                
                currentTask = (currentTask + 1) % tasks.length;
            }, 2000);
        });
    </script>
</body>
</html>
